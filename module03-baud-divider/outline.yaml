    lab is divider literacy—not a full UART yet.'
- type: bullets
  title: Pitfalls to watch
  bullets:
  - Do not confuse baud_tick with the serial line, it is an internal enable, one sysclk
    wide
  - Toggle mode is not UART bit timing; its period is two times DIV, not DIV
  - Integer division truncates, real designs pick f_sys and baud so the error stays
    acceptable
  - With oversampling
  - And remember
  notes: 'Do not confuse baud_tick with the serial line—it is an internal enable,
    one sysclk wide. Toggle mode is not UART bit timing; its period is two times DIV,
    not DIV. Integer division truncates—real designs pick f_sys and baud so the error
    stays acceptable. With oversampling, divide by baud times OS, not baud alone—that
    preview matters in the next module. And remember: the sketch panel shows concept
    Verilog; synthesis still needs reset and clock-domain hygiene.'
