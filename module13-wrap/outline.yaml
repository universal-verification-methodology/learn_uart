  notes: You can describe a UART frame—idle, start, data, optional parity, stop—and
    name common error cases like framing and overrun. You can map a UART spec into
    an RTL checklist and explain baud timing with oversampling ideas. You can place
    FIFO plus valid-ready handshake in a datapath story and sketch a self-checking
    testbench rhythm. You can read basic waves for debug and explain how classic pin
    TB roles map to agents, checkers, coverage, and docs. That is UART literacy—not
    full chip verification planning, which lives in a different course.
